<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Plasma AI</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
<nav class="navbar">
  <div class="container">
    <div class="nav-inner">

      <!-- Logo -->
      <a href="index.html" class="nav-logo">
        <div class="logo-mark">
          <!-- Hexagon icon -->
          <svg viewBox="0 0 18 18" fill="none">
            <path d="M9 2L15.5 5.5V12.5L9 16L2.5 12.5V5.5L9 2Z"
                  stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="9" cy="9" r="2" fill="white"/>
          </svg>
        </div>
        Plasma AI
      </a>

      <!-- Desktop nav links -->
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="services/services.html">Services</a></li>
        <li><a href="pricing/pricing.html">Pricing</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="faq/faq.html">FAQ</a></li>
        <li><a href="contact.html">Contact</a></li>
        <!-- Demo link styled differently — see .nav-demo in CSS -->
        <li><a href="demo/index.html" class="nav-demo">Demo</a></li>
      </ul>

      <!-- CTA buttons -->
      <div class="nav-cta">
        <a href="contact.html" class="btn btn--ghost">Book a Call</a>
        <a href="contact.html" class="btn btn--primary">
          Free Audit
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor"
                  stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </a>
      </div>

      <!-- Mobile hamburger button (visible only on small screens via CSS) -->
      <button id="navToggle" aria-label="Open menu">☰</button>

    </div>
  </div>
</nav>

  <!-- Contact Hero -->
<section class="section">
  <section class="hero">
    <div class="container">
      <div class="contact-hero reveal">
        <h1>Start with a conversation</h1>
        <p>
          30 minutes to understand your workflows and whether Plasma AI can help.
          No sales pressure, just clarity.
        </p>
        <div class="contact-item">
          <a href="mailto:contact@plasmaai.com" class="cta-button cta-lg">Email Us</a>
          <p class="contact-items">contact@plasmaai.com</p>
        </div>
      </div>
    </div>
  </section>
</section>

  <!-- Form -->
  <section class="section">
    <div class="contact-form-wrap" style="width:1000px;">
      <form id="contact-form" class="contact-form reveal">
        <div class="form-group">
        <div class="form-row">
          <input type="text" name="name" placeholder="Your name" required>
          <input type="email" name="email" placeholder="Your email" required>
        </div>
        </div>
        <div class="form-group">
        <div class="form-row">
          <input type="text" name="company" placeholder="Company (optional)">
          <select name="service">
            <option>Interested in...</option>
            <option>Workflow Audit</option>
            <option>Full Strategy</option>
            <option>Ongoing Advisory</option>
          </select>
        </div>
        </div>
        <div class="form-group">
        <textarea name="message" placeholder="Tell us about your workflows or challenges..." rows="6" required></textarea>
        
        <a type="submit" class="btn--primary">Send Message</a>
        </div>
      </form>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
